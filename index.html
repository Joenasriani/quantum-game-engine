<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Platformer Game</title>
    <style>
        body { margin: 0; overflow: hidden; }
        canvas { background: #87CEEB; display: block; margin: 0 auto; }
        .score { font-size: 20px; position: absolute; top: 20px; left: 20px; color: white; }
    </style>
</head>
<body>
    <div class="score">Score: 0</div>
    <canvas id="gameCanvas"></canvas>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 800;
        canvas.height = 400;

        let player = { x: 50, y: canvas.height - 60, width: 30, height: 30, dy: 0, gravity: 0.5, jumpPower: -10, onGround: false };
        let platforms = [{ x: 0, y: canvas.height - 20, width: canvas.width, height: 20 }];
        let collectibles = [{ x: 300, y: canvas.height - 50, width: 20, height: 20, collected: false }];
        let score = 0;

        function update() {
            player.dy += player.gravity;
            player.y += player.dy;

            // Player collision with platforms
            platforms.forEach(platform => {
                if (player.x < platform.x + platform.width && player.x + player.width > platform.x &&
                    player.y + player.height < platform.y + platform.height && player.y + player.height + player.dy >= platform.y) {
                    player.y = platform.y - player.height;
                    player.dy = 0;
                    player.onGround = true;
                }
            });

            if (player.y + player.height > canvas.height) {
                player.y = canvas.height - player.height;
                player.dy = 0;            
            }

            // Collectibles collision
            collectibles.forEach(collectible => {
                if (!collectible.collected && player.x < collectible.x + collectible.width && player.x + player.width > collectible.x &&
                    player.y < collectible.y + collectible.height && player.y + player.height > collectible.y) {
                    collectible.collected = true;
                    score++;
                }
            });
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = 'green';
            platforms.forEach(platform => ctx.fillRect(platform.x, platform.y, platform.width, platform.height));
            ctx.fillStyle = 'gold';
            collectibles.forEach(collectible => { if (!collectible.collected) ctx.fillRect(collectible.x, collectible.y, collectible.width, collectible.height); });
            ctx.fillStyle = 'blue';
            ctx.fillRect(player.x, player.y, player.width, player.height);
            document.querySelector('.score').innerText = 'Score: ' + score;
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        window.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowUp' && player.onGround) {
                player.dy = player.jumpPower;
                player.onGround = false;
            }
        });

        gameLoop();
    </script>
</body>
</html>
