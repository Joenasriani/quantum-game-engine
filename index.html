<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Launcher</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; }
        .button { padding: 10px 20px; margin: 10px; font-size: 16px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>Game Launcher</h1>
    <button class="button" onclick="launchFlappyBird()">Play Flappy Bird</button>
    <button class="button" onclick="launchPlatformer()">Play Platformer</button>

    <script>
        function launchFlappyBird() {
            // Logic for launching Flappy Bird game
            alert('Launching Flappy Bird...');
        }

        function launchPlatformer() {
            // Logic for launching Platformer game
            alert('Launching Platformer...');
        }
    </script>
</body>
</html>
