<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Launcher</title>
    <style>
        body { font-family: Arial, sans-serif; }
        #menu { display: flex; flex-direction: column; align-items: center; }
        button { margin: 10px; padding: 10px; font-size: 16px; }
    </style>
</head>
<body>
    <div id="menu">
        <h1>Game Selection Menu</h1>
        <button onclick="launchFlappyBird()">Play Flappy Bird</button>
        <button onclick="launchPlatformer()">Play Platformer</button>
    </div>
    <script>
        function launchFlappyBird() {
            window.open('https://your-flappy-bird-url.com', '_blank');
        }

        function launchPlatformer() {
            window.open('https://your-platformer-url.com', '_blank');
        }
    </script>
</body>
</html>
